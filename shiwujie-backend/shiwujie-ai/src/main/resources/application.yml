server:
  port: 8500
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8
spring:
  application:
    name: shiwujieAi
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: shiwujieai
    password: ${MYSQL_PASSWORD:PbEbzPLk6XEDj3aC}
    url: jdbc:mysql://47.112.114.139:3306/shiwujieai
  data:
    redis:
      host: 47.112.114.139
      port: 6379
      database: 2
      password: ${REDIS_PASSWORD:123456}
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-6374b4a1ebd64f56ae8d0799e74b7927}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen3-max
    chat:
      client:
        enabled: true
  cloud:
    nacos:
      discovery:
        server-addr: ${nacos.address:47.112.114.139}:8848
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        # discovery.ip 由 dev/prod profile 覆盖：dev=127.0.0.1(本机)，prod=47.112.114.139(服务器)
    compatibility-verifier:
      enabled: false
# 明确指定日志配置
logging:
  config: classpath:logback-spring.xml
# searchApi
search-api:
  api-key: ${SEARCH_API_KEY:4qkQ96eSGHAbAQKS5wbs8WyT}
#dubbo配置
dubbo:
  application:
    name: shiwujie-ai
    logger: slf4j
    serialize-check-status: DISABLE
    qos-enable: false
  protocol:
    name: dubbo
    port: 50500
  registry:
    address: nacos://${nacos.address:47.112.114.139}:8848?username=${NACOS_USERNAME:nacos}&password=${NACOS_PASSWORD:nacos}
    timeout: 5000
    parameters:
      empty-protection: true   # 关键：开启空保护
