spring:
  application:
    name: shiwujieCall
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: shiwujiecall
    password: ${MYSQL_PASSWORD:2Pht6wWZK5aRm4c5}
    url: jdbc:mysql://47.112.114.139:3306/shiwujiecall
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      max-lifetime: 30000   #不能小于30秒，否则默认回到1800秒
      connection-test-query: SELECT 1
      idle-timeout: 30000
      connection-timeout: 30000
  # 在关闭时不等待 Lettuce 连接优雅退出，避免阻塞
  redis:
    host: 47.112.114.139
    port: 6379
    database: 2
    password: ${REDIS_PASSWORD:123456}
    lettuce:
      shutdown-timeout: 0ms
    # 设置合理超时时间，防止连接验证阻塞
    timeout: 2s
  cloud:
    nacos:
      server-addr: ${nacos.address:47.112.114.139}:8848
      # discovery.ip 由 dev/prod profile 覆盖：dev=127.0.0.1(本机)，prod=47.112.114.139(服务器)
server:
  servlet:
    context-path: /api  # 确保这里没有设置特殊的context-path
  port: 8300
mybatis-plus:
  configuration:
    # 关闭自动映射下划线到驼峰的规则
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)
#dubbo配置
dubbo:
  application:
    name: shiwujie-call
    logger: slf4j
    serialize-check-status: DISABLE
    qos-enable: false
  protocol:
    name: dubbo
    port: 21300
  registry:
    address: nacos://${nacos.address:47.112.114.139}:8848?username=${NACOS_USERNAME:nacos}&password=${NACOS_PASSWORD:nacos}
    timeout: 5000
    parameters:
      empty-protection: true   # 关键：开启空保护
