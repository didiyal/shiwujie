<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebSocket 测试</title>
</head>
<body>
<div>
  <label>用户ID：</label>
  <input type="text" id="userId" value="1"/>
  <button onclick="connect()">连接</button>
  <button onclick="disconnect()">断开</button>
</div>
<div>
  <label>目标用户ID：</label>
  <input type="text" id="targetId" value="2"/>
  <button onclick="sendEnter()">发送Enter消息</button>
</div>
<div>
  <h3>消息记录：</h3>
  <div id="messages" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc;"></div>
</div>

<script>
  let ws;
  let currentUuid;

  function connect() {
    const userId = document.getElementById('userId').value;
    ws = new WebSocket(`ws://localhost:8080/websocket/${userId}`);

    ws.onopen = () => {
      addMessage('连接成功');
      setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            code: 'PING',
            data: {}
          }));
        }
      }, 30000);
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.code === 'CONNECT_SUCCESS') {
        currentUuid = data.data;
      }
      addMessage('收到消息：' + event.data);
    };

    ws.onclose = () => {
      addMessage('连接关闭');
    };

    ws.onerror = (error) => {
      console.error('WebSocket错误:', error);
      addMessage('连接错误：' + JSON.stringify(error));
    };
  }

  function disconnect() {
    if (ws) {
      ws.close();
    }
  }

  function sendEnter() {
    if (!ws) {
      alert('请先连接WebSocket');
      return;
    }

    const targetId = document.getElementById('targetId').value;
    const message = {
      code: 'ENTER',
      data: {
        targetId: targetId
      }
    };

    ws.send(JSON.stringify(message));
    addMessage('发送Enter消息：' + JSON.stringify(message));
  }

  function addMessage(message) {
    const messagesDiv = document.getElementById('messages');
    const messageElement = document.createElement('div');
    messageElement.textContent = new Date().toLocaleTimeString() + ' - ' + message;
    messagesDiv.appendChild(messageElement);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }
</script>
</body>
</html>
