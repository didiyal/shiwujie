spring:
  application:
    name: shiwujieAI
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      max-lifetime: 30000   #不能小于30秒，否则默认回到1800秒
      connection-test-query: SELECT 1
      idle-timeout: 30000
      connection-timeout: 30000
  # ai配置
  ai:
    dashscope:
      api-key: sk-6374b4a1ebd64f56ae8d0799e74b7927
      chat:
        options:
          model: qwen-vl-max
          multi-model: true
    # deepseek
    openai:
      api-key: sk-6717d9d3bdd44474af03115a68a207b4
      chat:
        options:
          model: deepseek-chat
        base-url: https://api.deepseek.com
    # 取消自动注入大模型
    chat:
      client:
        enabled: false
#    # 搜索服务配置
#    mcp:
#      client:
#        stdio:
#          servers-configuration: classpath:mcp-servers.json
server:
  port: 8500
mybatis-plus:
  configuration:
    # 关闭自动映射下划线到驼峰的规则
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)
#dubbo配置
dubbo:
  application:
    name: shiwujie-ai
    logger: slf4j
    qos-port: 33360
    serialize-check-status: DISABLE
  registry:
    address: nacos://${nacos.address:127.0.0.1}:8848?username=nacos&password=nacos
    timeout: 5000
# 解决Nacos与Logback配置冲突问题
nacos:
  logging:
    config-enabled: false
# 明确指定日志配置
logging:
  config: classpath:logback-spring.xml
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'ai'
      paths-to-match: '/**'
      packages-to-scan: com.swj.shiwujie.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
# searchApi
search-api:
  api-key: 4qkQ96eSGHAbAQKS5wbs8WyT
# 图片上传路径配置
upload:
  image-path: ${user.home}/shiwujie/images
