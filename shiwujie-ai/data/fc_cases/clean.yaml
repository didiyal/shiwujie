      - {input: "明天的呢", tool_calls: [get_weather], forbidden: []}
  - id: c083
    category: multi_turn
    turns:
      - {input: "搜下最近新闻", tool_calls: [web_search], forbidden: []}
      - {input: "再搜下黄金价格", tool_calls: [web_search], forbidden: []}
  - id: c084
    category: multi_turn
    turns:
      - {input: "怎么修改手机号", tool_calls: [search_kb], forbidden: []}
      - {input: "那就帮我改吧，新号码13800003333", tool_calls: [update_profile], forbidden: [], args_checks: {update_profile: {phone: {contains: "13800003333"}}}}
