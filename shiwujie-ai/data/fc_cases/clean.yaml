      - {input: "帮我把昵称改成小红", tool_calls: [update_profile], forbidden: [], args_checks: {update_profile: {nickname: {contains: 小红}}}}
  - id: c079
    category: multi_turn
    turns:
      - {input: "我想加一个家庭，号码是13800002222", tool_calls: [join_family], forbidden: [], args_checks: {join_family: {family_phone: {contains: "13800002222"}}}}
      - {input: "我家里现在有谁", tool_calls: [family_info], forbidden: []}
  - id: c080
